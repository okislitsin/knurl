name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      # default-members exclude knurl-sim, so this never needs SDL2
      - name: Run tests
        run: cargo test --all-features

      # knurl-sim is outside default-members (SDL2 system dep);
      # verify it still compiles via the SDL2-free `web` feature
      - name: Check knurl-sim (no SDL2)
        run: cargo check -p knurl-sim --no-default-features --features web
